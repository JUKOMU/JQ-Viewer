apply plugin: 'com.android.application'

def keystorePropertiesFile = rootProject.file('keystore.properties')
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

def validateReleaseSigning = {
    if (!keystorePropertiesFile.exists()) {
        throw new GradleException("Release signing requires android/keystore.properties. Debug signing fallback is not allowed.")
    }

    def missingProperties = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword'].findAll {
        !keystoreProperties[it]?.toString()?.trim()
    }
    if (!missingProperties.isEmpty()) {
        throw new GradleException("Release signing is missing required keystore properties: ${missingProperties.join(', ')}")
    }

    def releaseStoreFile = rootProject.file(keystoreProperties['storeFile'])
    if (!releaseStoreFile.exists()) {
        throw new GradleException("Release signing keystore file does not exist: ${releaseStoreFile}")
    }
}

def hasReleaseSigningProperties = keystorePropertiesFile.exists() &&
    ['storeFile', 'storePassword', 'keyAlias', 'keyPassword'].every {
        keystoreProperties[it]?.toString()?.trim()
    }

gradle.taskGraph.whenReady { taskGraph ->
    if (taskGraph.allTasks.any { it.name.toLowerCase().contains('release') }) {
        validateReleaseSigning()
    }
}

android {
    namespace = "io.github.jukomu"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "io.github.jukomu"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "1.1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    if (hasReleaseSigningProperties) {
        signingConfigs {
            release {
                storeFile rootProject.file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigningProperties) {
                signingConfig signingConfigs.release
            }
        }
    }
    compileOptions {
        coreLibraryDesugaringEnabled true
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "io.github.jukomu:jmcomic-api:$jmcomicApiVersion"
    implementation "io.github.jukomu:jmcomic-core:$jmcomicApiVersion"
    implementation "io.github.jukomu:jmcomic-android-support:$jmcomicApiVersion"
    implementation 'uk.uuid.slf4j:slf4j-android:2.0.17-0'
    implementation 'androidx.security:security-crypto:1.1.0'
    implementation 'androidx.documentfile:documentfile:1.0.1'
    implementation 'com.google.mlkit:text-recognition-chinese:16.0.1'
    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
